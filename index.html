<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Museum of Moments</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
min-height:100vh;
}
  
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
background:linear-gradient(to bottom,#000,#111);
}

#login h1{
color:gold;
margin-bottom:15px;
font-size:32px;
}

#login p{
max-width:350px;
margin-bottom:20px;
color:#ddd;
}

input{
padding:12px;
width:280px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

#museum{
display:none;
padding:20px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
color:gold;
margin-bottom:10px;
}

.music-btn{
position:fixed;
right:15px;
bottom:15px;
z-index:999;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border:3px solid gold;
border-radius:12px;
cursor:pointer;
}

.viewer{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:1000;
}

.viewer img{
max-width:95%;
max-height:90%;
border:4px solid gold;
border-radius:12px;
}
</style>
</head>

<body>

<div id="login">
<h1>🏛️ The Museum of Moments</h1>

<p>
A collection of memories, laughter, journeys and stories preserved forever.
</p>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="enterMuseum()">Enter Museum</button>
</div>

<div id="museum">

<div class="header">
<h1>✨ Shubham Memory Museum ✨</h1>
<p>Every photo tells a story.</p>
</div>

<div class="gallery">

<!-- PHOTOS -->

<img src="https://picsum.photos/500?1">
<img src="https://picsum.photos/500?2">
<img src="https://picsum.photos/500?3">
<img src="https://picsum.photos/500?4">
<img src="https://picsum.photos/500?5">
<img src="https://picsum.photos/500?6">

</div>

<button class="music-btn" onclick="toggleMusic()">
🎵 Music
</button>

</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<audio id="bgmusic" loop>
<source src="" type="audio/mpeg">
</audio>

<script>

function enterMuseum(){

let pass=document.getElementById("password").value;

if(pass==="Skn@7085"){
document.getElementById("login").style.display="none";
document.getElementById("museum").style.display="block";
}else{
alert("Wrong Password");
}
}

document.querySelectorAll(".gallery img").forEach(img=>{
img.addEventListener("click",()=>{
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=img.src;
});
});

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

let playing=false;

function toggleMusic(){

const music=document.getElementById("bgmusic");

if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}
}

</script>

</body>
</html>
